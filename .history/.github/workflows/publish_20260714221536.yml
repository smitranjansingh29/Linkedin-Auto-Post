name: Publish approved draft

on:
  push:
    paths:
      - "approved/**"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Publish to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_URN: ${{ secrets.LINKEDIN_URN }}
          DRY_RUN: "true"
        run: python scripts/publish_linkedin.py

      - name: Commit posted archive
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "linkedin-auto-poster-bot"
          git config user.email "bot@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git

          git add posted/ approved/

          git diff --staged --quiet || git commit -m "Mark draft as posted"

          git fetch origin
          git pull --rebase origin main

          git push origin HEAD:main
