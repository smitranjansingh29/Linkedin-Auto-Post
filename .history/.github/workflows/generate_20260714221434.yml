name: Generate draft

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch sources
        run: python scripts/fetch_sources.py

      - name: Dedupe and score
        run: python scripts/dedupe_score.py

      - name: Generate draft
        id: draft
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_draft.py

      - name: Send to Telegram for approval
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_telegram.py "${{ steps.draft.outputs.draft_id }}"

      - name: Commit pending draft
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "linkedin-auto-poster-bot"
          git config user.email "bot@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git

          git add pending/

          git diff --staged --quiet || git commit -m "New pending draft"

          # Fetch latest changes from GitHub
          git fetch origin

          # Rebase your commit on top of the latest main branch
          git pull --rebase origin main

          # Push your commit
          git push origin HEAD:main
